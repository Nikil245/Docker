server {
    listen 80;

    # Serve static frontend files
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Optional: proxy /api calls to backend (useful in production)
    # location /api/ {
    #     proxy_pass http://backend:5000/api/;
    # }
}
